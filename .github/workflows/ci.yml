name: Backend CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select E,F,W --ignore E501

      - name: Type check with pyright
        run: |
          pip install pyright
          pyright server.py core/graphrag.py || true

      - name: Health-check server (smoke test)
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASS: test
          PINECONE_API_KEY: test
          PINECONE_INDEX: test
          GENAI_API_KEY: test
        run: |
          timeout 15 uvicorn server:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status') else 1)" || true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jalmitra-backend:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run -d --name test-be \
            -e NEO4J_URI=bolt://localhost:7687 \
            -e NEO4J_USER=neo4j \
            -e NEO4J_PASS=test \
            -e PINECONE_API_KEY=test \
            -e PINECONE_INDEX=test \
            -e GENAI_API_KEY=test \
            -p 8000:8000 \
            jalmitra-backend:${{ github.sha }} || true
